name: Deploy Functions

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - 'functions/**'
      - 'shared/**'
      - '.github/workflows/deploy-functions.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Prepare shared-local for Functions
        run: cp -r shared functions/shared-local

      - name: Install dependencies
        run: pnpm install

      - name: Build shared
        run: pnpm --filter @lunatics/shared build

      - name: Build functions
        run: pnpm --filter lunatics-functions build

      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_LUNATICS_D8B5A }}'

      - name: Install Firebase CLI
        run: pnpm add -g firebase-tools

      - name: Deploy to Firebase Functions
        run: firebase deploy --only functions --project lunatics-d8b5a
